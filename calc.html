
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Responsive Calculator</title>
    <style>
        @media (max-width:540px) {
            div.empty { display: none; }
            div.vertical { display: block; }
            div.horizontal { display: none; }
        }
        @media (max-width:360px) {
            div.empty { display: block; }
            div.vertical { display: none; }
            div.horizontal { display: none; }
        }
        @media (min-width:541px){
            div.empty { display: none; }
            div.vertical { display: none; }
            div.horizontal { display: block; }
        }

    body { 
        margin: 0; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100vh; 
        background-color: #f8f8f8; 
        font-family: Arial, sans-serif; 
        }

    table { 
        border-collapse: separate; 
        border-spacing: 5px; 
        background: #ebebeb; 
        border: 1px solid #ccc; 
        border-radius: 5px; 
    }

    td {     
        padding: 0; 
    }
        
        .display-box { background: #fff; border: 1px solid #aaa; height: 50px; text-align: right; padding: 0 10px; box-sizing: border-box; }
        .display-text { font-size: 28px; line-height: 50px; color: #333; }

        button { 
            width: 100%; height: 55px; cursor: pointer; 
            border: 1px solid #ccc; border-radius: 3px;
            font-size: 18px; font-weight: bold; background: #fdfdfd;
        }
        button:hover { background: #f0f0f0; }

        .btn-op { background: #ffcc33; color: #000; border-color: #e6b82e; } 
        .btn-func { background: #dcdcdc; color: #555; } 
        .btn-blank { background: #dcdcdc; border: none; cursor: default; } 
        
        .footer-link { text-align: center; font-size: 12px; color: blue; text-decoration: underline; padding-top: 10px; }
        .copyright { text-align: right; font-size: 12px; font-weight: bold; padding-right: 5px; color: #555; }
    </style>
</head>

<body>
    <div class="empty"><p>표시할수 없음.</p>
    </div>

    <div class="vertical">
        <table width="360" height="660">
            <tr><td colspan="4" class="display-box"><span class="display-text">30</span></td></tr>
            <tr>
                <td><button class="btn-blank"></button></td>
                <td><button class="btn-blank"></button></td>
                <td><button class="btn-blank"></button></td>
                <td><button class="btn-op" id="v-div">÷</button></td>
            </tr>
            <tr>
                <td><button class="btn-func" id="v-ce">CE</button></td>
                <td><button class="btn-func" id="v-root">√x</button></td>
                <td><button class="btn-func" id="v-per">%</button></td>
                <td><button class="btn-op" id="v-mul">×</button></td>
            </tr>
            <tr>
                <td><button id="v-7">7</button></td>
                <td><button id="v-8">8</button></td>
                <td><button id="v-9">9</button></td>
                <td><button class="btn-op" id="v-sub">-</button></td>
            </tr>
            <tr>
                <td><button id="v-4">4</button></td>
                <td><button id="v-5">5</button></td>
                <td><button id="v-6">6</button></td>
                <td><button class="btn-op" id="v-add">+</button></td>
            </tr>
            <tr>
                <td><button id="v-1">1</button></td>
                <td><button id="v-2">2</button></td>
                <td><button id="v-3">3</button></td>
                <td><button class="btn-op" id="v-eq">=</button></td>
            </tr>
            <tr>
                <td><button id="v-0">0</button></td>
                <td><button id="v-dot">.</button></td>
                <td><button id="v-pm">+/-</button></td>
                <td class="btn-blank"></td>
            </tr>
            <tr>
                <td><button class="btn-func" id="v-pi">π</button></td>
                <td><button class="btn-func" id="v-sq">x²</button></td>
                <td><button class="btn-func" id="v-r2">R2</button></td>
                <td><button class="btn-func" id="v-r0">R0</button></td>
            </tr>
            <tr><td colspan="4"><div class="footer-link">Get a Widget for this Calculator</div></td></tr>
            <tr><td colspan="4"><div class="copyright"><h1>(20233099 안보성)</h1></div></td></tr>
        </table>
    </div>

    <div class="horizontal">
        <table width="540" height="480">
            <tr><td colspan="6" class="display-box"><span class="display-text">30</span></td></tr>
            <tr>
                <td><button class="btn-blank"></button></td>
                <td><button class="btn-blank"></button></td>
                <td><button id="h-7">7</button></td>
                <td><button id="h-8">8</button></td>
                <td><button id="h-9">9</button></td>
                <td><button class="btn-func" id="h-r2">R2</button></td>
            </tr>
            <tr>
                <td><button class="btn-blank"></button></td>
                <td><button class="btn-blank"></button></td>
                <td><button id="h-4">4</button></td>
                <td><button id="h-5">5</button></td>
                <td><button id="h-6">6</button></td>
                <td><button class="btn-func" id="h-r0">R0</button></td>
            </tr>
            <tr>
                <td><button class="btn-func" id="h-pi">π</button></td>
                <td><button class="btn-func" id="h-sq">x²</button></td>
                <td><button id="h-1">1</button></td>
                <td><button id="h-2">2</button></td>
                <td><button id="h-3">3</button></td>
                <td><button class="btn-func" id="h-ce">CE</button></td>
            </tr>
            <tr>
                <td><button class="btn-func" id="h-root">√x</button></td>
                <td><button class="btn-func" id="h-per">%</button></td>
                <td><button id="h-0">0</button></td>
                <td><button id="h-dot">.</button></td>
                <td><button id="h-pm">+/-</button></td>
                <td><button class="btn-op" id="h-eq">=</button></td>
            </tr>
            <style>
                .horizontal td:nth-child(5) button.btn-op { height: 55px; }
            </style>
            </table>
        <div class="footer-link">Get a Widget for this Calculator</div>
        <div class="copyright"><h1>(20233099 안보성)</h1></div>
    </div>
</body>
</html>
