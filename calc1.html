
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Responsive Calculator</title>
    <style>
        @media (max-width:540px) {
            div.empty { display: none; }
            div.vertical { display: block; }
            div.horizontal { display: none; }
        }
        @media (max-width:360px) {
            div.empty { display: block; }
            div.vertical { display: none; }
            div.horizontal { display: none; }
        }
        @media (min-width:541px){
            div.empty { display: none; }
            div.vertical { display: none; }
            div.horizontal { display: block; }
        }

        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #f8f8f8; 
            font-family: Arial, sans-serif; 
        }

        table { 
            border-collapse: separate; 
            border-spacing: 5px; 
            background: #ebebeb; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            padding: 5px;
        }

        td {     
            padding: 0; 
        }
        
        .display-box { 
            background: #fff; 
            border: 1px solid #aaa; 
            height: 50px; 
            text-align: right; 
            padding: 0 10px; 
            box-sizing: border-box; 
            margin-bottom: 5px;
        }
        
        .display-text { 
            font-size: 28px; 
            line-height: 50px; 
            color: #333; 
        }

        button { 
            width: 100%; 
            height: 55px; 
            cursor: pointer; 
            border: 1px solid #ccc; 
            border-radius: 3px;
            font-size: 18px; 
            font-weight: bold; 
            background: #fdfdfd;
        }
        
        button:hover { background: #f0f0f0; }

        .btn-op { background: #ffcc33; color: #000; border-color: #e6b82e; } 
        .btn-op:hover { background: #e6b82e; }
        .btn-func { background: #dcdcdc; color: #555; } 
        .btn-blank { background: #dcdcdc; border: none; cursor: default; } 
        
        .footer-link { text-align: center; font-size: 12px; color: blue; text-decoration: underline; padding-top: 10px; }
        .copyright { text-align: right; font-size: 12px; font-weight: bold; padding-right: 5px; color: #555; }
        .copyright h1 { font-size: 12px; margin: 5px 0 0 0; }
    </style>
</head>

<body>
    <div class="empty">
        <p>표시할수 없음.</p>
    </div>

    <div class="vertical">
        <table width="360">
            <tr><td colspan="4" class="display-box"><span class="display-text" id="display-v">0</span></td></tr>
            <tr>
                <td><button class="btn-func" onclick="clearEntry()">CE</button></td>
                <td><button class="btn-func" onclick="sqrtButton()">√x</button></td>
                <td><button class="btn-func" onclick="percentButton()">%</button></td>
                <td><button class="btn-op" onclick="operatorButton('/')">÷</button></td>
            </tr>
            <tr>
                <td><button onclick="numberButton('7')">7</button></td>
                <td><button onclick="numberButton('8')">8</button></td>
                <td><button onclick="numberButton('9')">9</button></td>
                <td><button class="btn-op" onclick="operatorButton('*')">×</button></td>
            </tr>
            <tr>
                <td><button onclick="numberButton('4')">4</button></td>
                <td><button onclick="numberButton('5')">5</button></td>
                <td><button onclick="numberButton('6')">6</button></td>
                <td><button class="btn-op" onclick="operatorButton('-')">-</button></td>
            </tr>
            <tr>
                <td><button onclick="numberButton('1')">1</button></td>
                <td><button onclick="numberButton('2')">2</button></td>
                <td><button onclick="numberButton('3')">3</button></td>
                <td><button class="btn-op" onclick="operatorButton('+')">+</button></td>
            </tr>
            <tr>
                <td><button onclick="numberButton('0')">0</button></td>
                <td><button onclick="dotButton()">.</button></td>
                <td><button onclick="pmButton()">+/-</button></td>
                <td><button class="btn-op" onclick="equalButton()">=</button></td>
            </tr>
            <tr>
                <td><button class="btn-func" onclick="piButton()">π</button></td>
                <td><button class="btn-func" onclick="squareButton()">x²</button></td>
                <td><button class="btn-func" onclick="round2()">R2</button></td>
                <td><button class="btn-func" onclick="round0()">R0</button></td>
            </tr>
            <tr><td colspan="4"><div class="footer-link">Get a Widget for this Calculator</div></td></tr>
            <tr><td colspan="4"><div class="copyright"><h1>(20233099 안보성)</h1></div></td></tr>
        </table>
    </div>

    <div class="horizontal">
        <table width="540">
            <tr><td colspan="7" class="display-box"><span class="display-text" id="display-h">0</span></td></tr>
            <tr>
                <td><button class="btn-blank"></button></td>
                <td><button class="btn-blank"></button></td>
                <td><button onclick="numberButton('7')">7</button></td>
                <td><button onclick="numberButton('8')">8</button></td>
                <td><button onclick="numberButton('9')">9</button></td>
                <td><button class="btn-op" onclick="operatorButton('/')">÷</button></td>
                <td><button class="btn-func" onclick="round2()">R2</button></td>
            </tr>
            <tr>
                <td><button class="btn-blank"></button></td>
                <td><button class="btn-blank"></button></td>
                <td><button onclick="numberButton('4')">4</button></td>
                <td><button onclick="numberButton('5')">5</button></td>
                <td><button onclick="numberButton('6')">6</button></td>
                <td><button class="btn-op" onclick="operatorButton('*')">×</button></td>
                <td><button class="btn-func" onclick="round0()">R0</button></td>
            </tr>
            <tr>
                <td><button class="btn-func" onclick="piButton()">π</button></td>
                <td><button class="btn-func" onclick="squareButton()">x²</button></td>
                <td><button onclick="numberButton('1')">1</button></td>
                <td><button onclick="numberButton('2')">2</button></td>
                <td><button onclick="numberButton('3')">3</button></td>
                <td><button class="btn-op" onclick="operatorButton('-')">-</button></td>
                <td><button class="btn-func" onclick="clearEntry()">CE</button></td>
            </tr>
            <tr>
                <td><button class="btn-func" onclick="sqrtButton()">√x</button></td>
                <td><button class="btn-func" onclick="percentButton()">%</button></td>
                <td><button onclick="numberButton('0')">0</button></td>
                <td><button onclick="dotButton()">.</button></td>
                <td><button onclick="pmButton()">+/-</button></td>
                <td><button class="btn-op" onclick="operatorButton('+')">+</button></td>
                <td><button class="btn-op" onclick="equalButton()">=</button></td>
            </tr>
            <tr><td colspan="7"><div class="footer-link">Get a Widget for this Calculator</div></td></tr>
            <tr><td colspan="7"><div class="copyright"><h1>(20233099 안보성)</h1></div></td></tr>
        </table>
    </div>

    <script>
        let curValue = 0;
        let operator = '';
        let isNewNumber = true;

        function updateDisplay(val) {
            document.getElementById('display-v').innerHTML = val;
            document.getElementById('display-h').innerHTML = val;
        }

        function getDisplayValue() {
            return document.getElementById('display-v').innerHTML;
        }

        function numberButton(num) {
            let current = getDisplayValue();
            if (isNewNumber || current === '0') {
                updateDisplay(num);
                isNewNumber = false;
            } else {
                updateDisplay(current + num);
            }
        }

        function dotButton() {
            let current = getDisplayValue();
            if (isNewNumber) {
                updateDisplay('0.');
                isNewNumber = false;
            } else if (!current.includes('.')) {
                updateDisplay(current + '.');
            }
        }

        function operatorButton(op) {
            curValue = parseFloat(getDisplayValue());
            operator = op;
            isNewNumber = true;
        }

        function equalButton() {
            if (operator === '') return;
            
            let newValue = parseFloat(getDisplayValue());
            let result = 0;

            if (operator === '+') {
                result = curValue + newValue;
            } else if (operator === '-') {
                result = curValue - newValue;
            } else if (operator === '*') {
                result = curValue * newValue;
            } else if (operator === '/') {
                if (newValue === 0) {
                    updateDisplay("Error");
                    isNewNumber = true;
                    operator = '';
                    return;
                }
                result = curValue / newValue;
            }

            updateDisplay(Number(result.toPrecision(12)).toString());
            operator = '';
            isNewNumber = true;
        }

        function clearEntry() {
            updateDisplay('0');
            curValue = 0;
            operator = '';
            isNewNumber = true;
        }

        function pmButton() {
            let current = parseFloat(getDisplayValue());
            updateDisplay(current * -1);
        }

        function percentButton() {
            let current = parseFloat(getDisplayValue());
            updateDisplay(current / 100);
            isNewNumber = true;
        }

        function sqrtButton() {
            let current = parseFloat(getDisplayValue());
            if (current < 0) {
                updateDisplay("Error");
            } else {
                updateDisplay(Math.sqrt(current));
            }
            isNewNumber = true;
        }

        function squareButton() {
            let current = parseFloat(getDisplayValue());
            updateDisplay(Math.pow(current, 2));
            isNewNumber = true;
        }

        function piButton() {
            updateDisplay(Math.PI.toFixed(8));
            isNewNumber = true;
        }

        function round2() {
            let current = parseFloat(getDisplayValue());
            updateDisplay(current.toFixed(2));
            isNewNumber = true;
        }

        function round0() {
            let current = parseFloat(getDisplayValue());
            updateDisplay(Math.round(current));
            isNewNumber = true;
        }
    </script>
</body>
</html>
